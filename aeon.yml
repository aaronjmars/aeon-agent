# Default model for all skills. Override per-run via workflow_dispatch or per-skill above.
# Options: claude-opus-4-6, claude-sonnet-4-6, claude-haiku-4-5-20251001
# Strategy: opus for creative/analytical skills (articles, ideas, features, self-improve)
#           sonnet for data-collection skills (token-report, repo-pulse, heartbeat, fetch-tweets)
model: claude-opus-4-6

# Output channels
channels:
  jsonrender:
    enabled: false  # Set to true (or JSONRENDER_ENABLED=true as repo var) to write json-render specs

# Messaging integration
# Polls for messages every 5 minutes on Telegram/Discord/Slack.
telegram:
  enabled: true
